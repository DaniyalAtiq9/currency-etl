name: Daily Currency Pipeline

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6:00 AM UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub's UI too

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Automated daily pipeline run"
          git push
